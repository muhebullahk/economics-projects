<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tic Tac Toe — by Azizullah Karimzada</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 24px;
    }

    h1 {
      font-size: 2rem;
      letter-spacing: 3px;
      color: #e94560;
    }

    .byline {
      font-size: 0.85rem;
      color: #888;
      letter-spacing: 1px;
      margin-top: -16px;
    }

    .mode-select {
      display: flex;
      gap: 12px;
    }

    .mode-btn {
      padding: 8px 20px;
      border: 2px solid #e94560;
      background: transparent;
      color: #eee;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s;
    }

    .mode-btn.active, .mode-btn:hover {
      background: #e94560;
      color: #fff;
    }

    .scoreboard {
      display: flex;
      gap: 32px;
      font-size: 1rem;
    }

    .score-box {
      text-align: center;
      padding: 12px 24px;
      border-radius: 12px;
      background: #16213e;
      border: 2px solid transparent;
      transition: border-color 0.3s;
    }

    .score-box.active { border-color: #e94560; }

    .score-box .label { font-size: 0.75rem; color: #aaa; margin-bottom: 4px; }
    .score-box .val { font-size: 1.8rem; font-weight: bold; }
    .score-box.x .val { color: #e94560; }
    .score-box.o .val { color: #0f3460; }
    .score-box.o .val { color: #4fc3f7; }

    .status {
      font-size: 1.1rem;
      min-height: 1.5em;
      color: #ccc;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
      position: relative;
      overflow: hidden;
    }

    .cell:hover:not(.taken) { background: #0f3460; transform: scale(1.04); }
    .cell.taken { cursor: default; }

    .cell.x { color: #e94560; }
    .cell.o { color: #4fc3f7; }

    .cell.win-cell {
      background: #0f3460;
      animation: pulse 0.6s ease-in-out infinite alternate;
    }

    @keyframes pulse {
      from { box-shadow: 0 0 0 0 rgba(233, 69, 96, 0.4); }
      to   { box-shadow: 0 0 0 10px rgba(233, 69, 96, 0); }
    }

    @keyframes pop {
      0%   { transform: scale(0.5); opacity: 0; }
      70%  { transform: scale(1.1); }
      100% { transform: scale(1);   opacity: 1; }
    }

    .cell .mark { animation: pop 0.25s ease-out; display: inline-block; }

    .btn {
      padding: 10px 32px;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 24px;
      cursor: pointer;
      font-size: 1rem;
      letter-spacing: 1px;
      transition: background 0.2s, transform 0.1s;
    }

    .btn:hover { background: #c73652; transform: scale(1.04); }
    .btn:active { transform: scale(0.97); }

    .footer { font-size: 0.75rem; color: #555; }

    .back-link {
      font-size: 0.78rem; color: #555; text-decoration: none;
      border: 1px solid #333; border-radius: 16px; padding: 5px 14px;
      transition: color 0.2s, border-color 0.2s;
    }
    .back-link:hover { color: #e94560; border-color: #e94560; }
  </style>
</head>
<body>

<h1>TIC TAC TOE</h1>
<div class="byline">by Azizullah Karimzada</div>

<div class="mode-select">
  <button class="mode-btn active" id="btnPvP" onclick="setMode('pvp')">2 Players</button>
  <button class="mode-btn" id="btnAI"  onclick="setMode('ai')">vs Computer</button>
</div>

<div class="scoreboard">
  <div class="score-box x" id="scoreX">
    <div class="label" id="labelX">Player X</div>
    <div class="val" id="valX">0</div>
  </div>
  <div class="score-box" id="scoreDraw">
    <div class="label">Draws</div>
    <div class="val" id="valD">0</div>
  </div>
  <div class="score-box o" id="scoreO">
    <div class="label" id="labelO">Player O</div>
    <div class="val" id="valO">0</div>
  </div>
</div>

<div class="status" id="status">X's turn</div>

<div class="board" id="board">
  <div class="cell" onclick="handleClick(0)"></div>
  <div class="cell" onclick="handleClick(1)"></div>
  <div class="cell" onclick="handleClick(2)"></div>
  <div class="cell" onclick="handleClick(3)"></div>
  <div class="cell" onclick="handleClick(4)"></div>
  <div class="cell" onclick="handleClick(5)"></div>
  <div class="cell" onclick="handleClick(6)"></div>
  <div class="cell" onclick="handleClick(7)"></div>
  <div class="cell" onclick="handleClick(8)"></div>
</div>

<button class="btn" onclick="resetGame()">New Game</button>

<div class="footer">Click a cell to play &nbsp;|&nbsp; New Game resets the board &nbsp;|&nbsp; Scores persist until page refresh</div>
<a class="back-link" href="../../index.html">← Back to Arcade</a>

<script>
  const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

  let board, current, over, mode, scores;

  function init() {
    board   = Array(9).fill('');
    current = 'X';
    over    = false;
    scores  = scores || { X: 0, O: 0, D: 0 };
    renderBoard();
    setStatus(`${label(current)}'s turn`);
    clearHighlights();
    updateScoreboard();
  }

  function setMode(m) {
    mode = m;
    document.getElementById('btnPvP').classList.toggle('active', m === 'pvp');
    document.getElementById('btnAI' ).classList.toggle('active', m === 'ai');
    document.getElementById('labelO').textContent = m === 'ai' ? 'Computer' : 'Player O';
    scores = { X: 0, O: 0, D: 0 };
    init();
  }

  function label(p) {
    if (p === 'O' && mode === 'ai') return 'Computer';
    return `Player ${p}`;
  }

  function handleClick(i) {
    if (over || board[i]) return;
    if (mode === 'ai' && current === 'O') return;
    place(i);
    if (!over && mode === 'ai' && current === 'O') {
      setTimeout(aiMove, 400);
    }
  }

  function place(i) {
    board[i] = current;
    renderCell(i);
    const win = checkWin();
    if (win) {
      highlight(win);
      scores[current]++;
      updateScoreboard();
      setStatus(`${label(current)} wins!`);
      over = true;
    } else if (board.every(Boolean)) {
      scores.D++;
      updateScoreboard();
      setStatus("It's a draw!");
      over = true;
    } else {
      current = current === 'X' ? 'O' : 'X';
      setStatus(`${label(current)}'s turn`);
    }
  }

  function aiMove() {
    const best = minimax(board.slice(), 'O');
    place(best.index);
  }

  function minimax(b, player, depth = 0) {
    const win = checkWinOn(b);
    if (win === 'O') return { score:  10 - depth };
    if (win === 'X') return { score: -10 + depth };
    const empty = b.reduce((a, v, i) => v ? a : [...a, i], []);
    if (!empty.length) return { score: 0 };

    const moves = empty.map(i => {
      b[i] = player;
      const result = minimax(b, player === 'O' ? 'X' : 'O', depth + 1);
      b[i] = '';
      return { index: i, score: result.score };
    });

    return moves.reduce((best, m) =>
      player === 'O'
        ? (m.score > best.score ? m : best)
        : (m.score < best.score ? m : best)
    );
  }

  function checkWin() {
    return WINS.find(([a, b, c]) =>
      board[a] && board[a] === board[b] && board[a] === board[c]
    ) || null;
  }

  function checkWinOn(b) {
    const line = WINS.find(([a, x, c]) => b[a] && b[a] === b[x] && b[a] === b[c]);
    return line ? b[line[0]] : null;
  }

  function renderBoard() {
    const cells = document.querySelectorAll('.cell');
    cells.forEach((cell, i) => {
      cell.className = 'cell';
      cell.innerHTML = '';
    });
  }

  function renderCell(i) {
    const cell = document.querySelectorAll('.cell')[i];
    cell.classList.add('taken', current.toLowerCase());
    cell.innerHTML = `<span class="mark">${current}</span>`;
  }

  function highlight(line) {
    const cells = document.querySelectorAll('.cell');
    line.forEach(i => cells[i].classList.add('win-cell'));
  }

  function clearHighlights() {
    document.querySelectorAll('.cell').forEach(c => c.classList.remove('win-cell'));
  }

  function setStatus(msg) {
    document.getElementById('status').textContent = msg;
  }

  function updateScoreboard() {
    document.getElementById('valX').textContent = scores.X;
    document.getElementById('valO').textContent = scores.O;
    document.getElementById('valD').textContent = scores.D;
    document.getElementById('scoreX').classList.toggle('active', current === 'X' && !over);
    document.getElementById('scoreO').classList.toggle('active', current === 'O' && !over);
  }

  function resetGame() { init(); }

  // Boot
  mode   = 'pvp';
  scores = { X: 0, O: 0, D: 0 };
  init();
</script>
</body>
</html>
