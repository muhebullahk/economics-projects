<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Candy Clicker — by Azizullah Karimzada</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a0a2e;
      color: #f0e0ff;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Left panel ── */
    #left {
      width: 260px;
      min-width: 260px;
      background: #12001f;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px;
      gap: 12px;
      border-right: 2px solid #3a1a5e;
      overflow-y: auto;
    }

    #left h2 { font-size: 0.75rem; color: #aa88cc; letter-spacing: 2px; text-transform: uppercase; }

    #candy-count {
      font-size: 2rem;
      font-weight: bold;
      color: #ff79c6;
      text-align: center;
      line-height: 1.1;
    }

    #candy-count span { font-size: 0.85rem; color: #cc99ee; display: block; margin-top: 2px; }

    .stat { font-size: 0.8rem; color: #bb99dd; text-align: center; }

    #candy-btn {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      border: none;
      background: radial-gradient(circle at 35% 35%, #ff79c6, #d63af9, #8b00ff);
      cursor: pointer;
      font-size: 5rem;
      box-shadow: 0 0 30px #d63af980, 0 0 60px #8b00ff40;
      transition: transform 0.08s, box-shadow 0.08s;
      user-select: none;
      position: relative;
    }

    #candy-btn:hover  { transform: scale(1.05); box-shadow: 0 0 40px #ff79c680, 0 0 80px #8b00ff60; }
    #candy-btn:active { transform: scale(0.93); box-shadow: 0 0 20px #ff79c640; }

    @keyframes spin-wobble {
      0%   { transform: scale(1) rotate(0deg); }
      25%  { transform: scale(1.03) rotate(3deg); }
      75%  { transform: scale(1.03) rotate(-3deg); }
      100% { transform: scale(1) rotate(0deg); }
    }

    #candy-btn.clicked { animation: spin-wobble 0.2s ease-out; }

    .divider { width: 100%; height: 1px; background: #3a1a5e; margin: 4px 0; }

    /* milestone log */
    #log {
      width: 100%;
      font-size: 0.72rem;
      color: #bb88ee;
      max-height: 80px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    #log div { padding: 2px 4px; background: #1f0035; border-radius: 4px; }

    /* ── Center panel ── */
    #center {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      background: radial-gradient(ellipse at center, #1f0a35 0%, #1a0a2e 70%);
    }

    #center-title {
      position: absolute;
      top: 16px;
      font-size: 1.4rem;
      font-weight: bold;
      letter-spacing: 4px;
      color: #ff79c6;
      text-shadow: 0 0 20px #ff79c680;
    }

    #center-byline {
      position: absolute;
      top: 48px;
      font-size: 0.72rem;
      color: #886699;
      letter-spacing: 1px;
    }

    #center-candy {
      font-size: 10rem;
      cursor: pointer;
      user-select: none;
      filter: drop-shadow(0 0 30px #ff79c6) drop-shadow(0 0 60px #8b00ff);
      transition: transform 0.08s;
      position: relative;
      z-index: 2;
    }

    #center-candy:active { transform: scale(0.92); }

    /* floating numbers */
    .floater {
      position: absolute;
      font-size: 1.3rem;
      font-weight: bold;
      color: #ff79c6;
      pointer-events: none;
      animation: float-up 1s ease-out forwards;
      z-index: 10;
      text-shadow: 0 0 8px #ff79c6;
    }

    @keyframes float-up {
      0%   { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-90px) scale(0.7); }
    }

    /* candy rain particles */
    .particle {
      position: absolute;
      font-size: 1.4rem;
      pointer-events: none;
      animation: fall linear forwards;
      z-index: 1;
    }

    @keyframes fall {
      0%   { transform: translateY(-40px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }

    /* ── Right panel (shop) ── */
    #right {
      width: 300px;
      min-width: 300px;
      background: #0e0020;
      border-left: 2px solid #3a1a5e;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #shop-header {
      padding: 14px 16px;
      font-size: 0.75rem;
      letter-spacing: 2px;
      color: #aa88cc;
      text-transform: uppercase;
      border-bottom: 1px solid #3a1a5e;
      background: #12001f;
    }

    #shop-tabs {
      display: flex;
      border-bottom: 1px solid #3a1a5e;
    }

    .tab {
      flex: 1;
      padding: 8px;
      text-align: center;
      cursor: pointer;
      font-size: 0.78rem;
      color: #997ab8;
      background: #0e0020;
      transition: background 0.2s, color 0.2s;
    }

    .tab.active { background: #1f0035; color: #ff79c6; border-bottom: 2px solid #ff79c6; }
    .tab:hover:not(.active) { background: #160028; color: #cc88ee; }

    #shop-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .shop-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 10px;
      background: #1a0030;
      border: 1px solid #3a1a5e;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    .shop-item:hover:not(.locked) { background: #2a0050; border-color: #cc66ff; }
    .shop-item.locked { opacity: 0.4; cursor: not-allowed; }
    .shop-item.affordable { border-color: #ff79c6; }

    .shop-item .icon { font-size: 1.8rem; min-width: 36px; text-align: center; }

    .shop-item .info { flex: 1; }
    .shop-item .name { font-size: 0.85rem; font-weight: bold; color: #f0d0ff; }
    .shop-item .desc { font-size: 0.7rem; color: #997ab8; margin-top: 1px; }
    .shop-item .cost { font-size: 0.75rem; color: #ff79c6; font-weight: bold; margin-top: 3px; }

    .shop-item .count {
      font-size: 1.1rem;
      font-weight: bold;
      color: #cc99ff;
      min-width: 28px;
      text-align: right;
    }

    /* save/reset */
    #bottom-bar {
      padding: 8px 12px;
      display: flex;
      gap: 8px;
      border-top: 1px solid #3a1a5e;
      background: #0e0020;
    }

    .sm-btn {
      flex: 1;
      padding: 6px;
      font-size: 0.72rem;
      border: 1px solid #3a1a5e;
      background: #1a0030;
      color: #bb99dd;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .sm-btn:hover { background: #2a0050; color: #ff79c6; }

    /* scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #3a1a5e; border-radius: 2px; }
  </style>
</head>
<body>

<!-- LEFT: stats -->
<div id="left">
  <h2>Candies</h2>
  <div id="candy-count">0 <span id="cps-display">0 per second</span></div>
  <div class="stat" id="cpc-display">1 per click</div>
  <div class="divider"></div>
  <button id="candy-btn" title="Click for candies!">🍬</button>
  <div class="divider"></div>
  <div class="stat">Total earned: <span id="total-display">0</span></div>
  <div class="stat">Total clicks: <span id="clicks-display">0</span></div>
  <div class="divider"></div>
  <h2>Milestones</h2>
  <div id="log"></div>
</div>

<!-- CENTER: big candy -->
<div id="center">
  <div id="center-title">CANDY CLICKER</div>
  <div id="center-byline">by Azizullah Karimzada</div>
  <div id="center-candy" title="Click for candies!">🍬</div>
</div>

<!-- RIGHT: shop -->
<div id="right">
  <div id="shop-header">Sweet Shop</div>
  <div id="shop-tabs">
    <div class="tab active" onclick="switchTab('upgrades')">Upgrades</div>
    <div class="tab" onclick="switchTab('buildings')">Buildings</div>
  </div>
  <div id="shop-list"></div>
  <div id="bottom-bar">
    <button class="sm-btn" onclick="saveGame()">💾 Save</button>
    <button class="sm-btn" onclick="confirmReset()">🗑 Reset</button>
    <a class="sm-btn" href="../../index.html" style="text-decoration:none;text-align:center;">← Arcade</a>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────
let candies = 0, totalEarned = 0, totalClicks = 0;
let candiesPerClick = 1, candiesPerSecond = 0;
let currentTab = 'upgrades';

const UPGRADES = [
  { id:'u1', name:'Sugar Rush',    icon:'⚡', cost:50,      bonus:1,   desc:'Fingers move faster. +1 per click.',     bought:false },
  { id:'u2', name:'Power Lick',    icon:'👅', cost:300,     bonus:4,   desc:'Seriously strong tongue. +4 per click.',  bought:false },
  { id:'u3', name:'Candy Drill',   icon:'🔩', cost:2000,    bonus:15,  desc:'Industrial-grade licking. +15/click.',   bought:false },
  { id:'u4', name:'Mega Munch',    icon:'🦷', cost:12000,   bonus:75,  desc:'Jaws of steel. +75 per click.',          bought:false },
  { id:'u5', name:'Ultra Crunch',  icon:'💥', cost:80000,   bonus:400, desc:'Sonic candy destruction. +400/click.',   bought:false },
  { id:'u6', name:'Quantum Taste', icon:'🌀', cost:600000,  bonus:2000,desc:'Taste all candies at once. +2000/click.',bought:false },
];

const BUILDINGS = [
  { id:'b1', name:'Lollipop',       icon:'🍭', baseCost:10,     cps:0.1,  count:0, desc:'A humble lollipop drips candy.' },
  { id:'b2', name:'Candy Bar',      icon:'🍫', baseCost:100,    cps:0.5,  count:0, desc:'Chocolate-coated production.' },
  { id:'b3', name:'Gumball Machine',icon:'🫧', baseCost:600,    cps:2.5,  count:0, desc:'Spins out candy all day long.' },
  { id:'b4', name:'Candy Shop',     icon:'🏪', baseCost:3000,   cps:10,   count:0, desc:'A whole shop working for you.' },
  { id:'b5', name:'Candy Factory',  icon:'🏭', baseCost:15000,  cps:40,   count:0, desc:'Automated sweet production.' },
  { id:'b6', name:'Sugar Mine',     icon:'⛏', baseCost:80000,  cps:150,  count:0, desc:'Mining raw sugar 24/7.' },
  { id:'b7', name:'Candy Rocket',   icon:'🚀', baseCost:400000, cps:600,  count:0, desc:'Launches candy from orbit.' },
  { id:'b8', name:'Candy Dimension',icon:'🌌', baseCost:2000000,cps:2500, count:0, desc:'Harvests candy from another realm.' },
];

const MILESTONES = [1,10,100,1000,10000,100000,1000000,10000000,100000000];
let nextMilestone = 0;

const CANDY_ICONS = ['🍬','🍭','🍫','🧁','🍩','🍪','🎂','🍡'];

// ── DOM refs ───────────────────────────────────────────────────────────
const centerCandy  = document.getElementById('center-candy');
const candyBtn     = document.getElementById('candy-btn');
const countEl      = document.getElementById('candy-count');
const cpsEl        = document.getElementById('cps-display');
const cpcEl        = document.getElementById('cpc-display');
const totalEl      = document.getElementById('total-display');
const clicksEl     = document.getElementById('clicks-display');
const shopList     = document.getElementById('shop-list');
const logEl        = document.getElementById('log');
const centerEl     = document.getElementById('center');

// ── Click handling ─────────────────────────────────────────────────────
function doClick(e) {
  const gain = candiesPerClick;
  candies     += gain;
  totalEarned += gain;
  totalClicks += 1;
  spawnFloater(e, `+${fmt(gain)}`);
  if (Math.random() < 0.12) spawnParticle();
  triggerWobble();
  checkMilestones();
  updateUI();
}

centerCandy.addEventListener('click', doClick);
candyBtn.addEventListener('click', doClick);

function triggerWobble() {
  candyBtn.classList.remove('clicked');
  void candyBtn.offsetWidth;
  candyBtn.classList.add('clicked');
}

// ── Floaters ──────────────────────────────────────────────────────────
function spawnFloater(e, text) {
  const el = document.createElement('div');
  el.className = 'floater';
  el.textContent = text;
  const rect = centerEl.getBoundingClientRect();
  const x = (e?.clientX ?? rect.left + rect.width/2)  - rect.left + (Math.random()*40 - 20);
  const y = (e?.clientY ?? rect.top  + rect.height/2) - rect.top;
  el.style.left = x + 'px';
  el.style.top  = y + 'px';
  centerEl.appendChild(el);
  el.addEventListener('animationend', () => el.remove());
}

// ── Candy rain ────────────────────────────────────────────────────────
function spawnParticle() {
  const el = document.createElement('div');
  el.className = 'particle';
  el.textContent = CANDY_ICONS[Math.floor(Math.random() * CANDY_ICONS.length)];
  el.style.left = Math.random() * 100 + '%';
  el.style.top  = '-40px';
  const dur = 2 + Math.random() * 2;
  el.style.animationDuration = dur + 's';
  centerEl.appendChild(el);
  setTimeout(() => el.remove(), dur * 1000 + 100);
}

// ── Shop ──────────────────────────────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', (i === 0 && tab === 'upgrades') || (i === 1 && tab === 'buildings'));
  });
  renderShop();
}

function buildingCost(b) {
  return Math.ceil(b.baseCost * Math.pow(1.15, b.count));
}

function renderShop() {
  shopList.innerHTML = '';
  const items = currentTab === 'upgrades' ? UPGRADES : BUILDINGS;
  items.forEach(item => {
    if (item.bought) return;
    const cost = currentTab === 'upgrades' ? item.cost : buildingCost(item);
    const locked = totalEarned < cost * 0.1 && item.count === 0;
    const canBuy = candies >= cost;

    const el = document.createElement('div');
    el.className = 'shop-item' + (locked ? ' locked' : canBuy ? ' affordable' : '');
    el.innerHTML = `
      <div class="icon">${item.icon}</div>
      <div class="info">
        <div class="name">${item.name}</div>
        <div class="desc">${item.desc}</div>
        <div class="cost">🍬 ${fmt(cost)}</div>
      </div>
      ${currentTab === 'buildings' ? `<div class="count">${item.count}</div>` : ''}
    `;
    if (!locked) el.addEventListener('click', () => buyItem(item));
    shopList.appendChild(el);
  });
}

function buyItem(item) {
  if (currentTab === 'upgrades') {
    if (candies < item.cost || item.bought) return;
    candies -= item.cost;
    item.bought = true;
    candiesPerClick += item.bonus;
    logMilestone(`Bought ${item.name}!`);
  } else {
    const cost = buildingCost(item);
    if (candies < cost) return;
    candies -= cost;
    item.count++;
    recalcCPS();
    logMilestone(`${item.name} #${item.count} built!`);
  }
  updateUI();
  renderShop();
}

function recalcCPS() {
  candiesPerSecond = BUILDINGS.reduce((s, b) => s + b.cps * b.count, 0);
}

// ── Milestones ────────────────────────────────────────────────────────
function checkMilestones() {
  if (nextMilestone >= MILESTONES.length) return;
  if (totalEarned >= MILESTONES[nextMilestone]) {
    logMilestone(`🎉 ${fmt(MILESTONES[nextMilestone])} candies earned!`);
    nextMilestone++;
    for (let i = 0; i < 6; i++) setTimeout(spawnParticle, i * 120);
  }
}

function logMilestone(msg) {
  const el = document.createElement('div');
  el.textContent = msg;
  logEl.prepend(el);
  if (logEl.children.length > 12) logEl.lastElementChild?.remove();
}

// ── Auto-production ────────────────────────────────────────────────────
let lastTick = performance.now();
function tick(now) {
  const dt = (now - lastTick) / 1000;
  lastTick = now;
  if (candiesPerSecond > 0) {
    const gain = candiesPerSecond * dt;
    candies     += gain;
    totalEarned += gain;
    checkMilestones();
    updateUI();
    renderShop();
  }
  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);

// ── UI update ─────────────────────────────────────────────────────────
function fmt(n) {
  n = Math.floor(n);
  if (n >= 1e12) return (n/1e12).toFixed(2) + 'T';
  if (n >= 1e9)  return (n/1e9).toFixed(2)  + 'B';
  if (n >= 1e6)  return (n/1e6).toFixed(2)  + 'M';
  if (n >= 1e3)  return (n/1e3).toFixed(1)  + 'K';
  return n.toString();
}

function updateUI() {
  countEl.childNodes[0].nodeValue = fmt(candies) + ' ';
  cpsEl.textContent   = fmt(candiesPerSecond) + ' per second';
  cpcEl.textContent   = fmt(candiesPerClick)  + ' per click';
  totalEl.textContent = fmt(totalEarned);
  clicksEl.textContent = fmt(totalClicks);
}

// ── Save / Load ────────────────────────────────────────────────────────
function saveGame() {
  localStorage.setItem('candyClicker', JSON.stringify({
    candies, totalEarned, totalClicks, candiesPerClick, nextMilestone,
    upgrades: UPGRADES.map(u => u.bought),
    buildings: BUILDINGS.map(b => b.count),
  }));
  logMilestone('Game saved!');
}

function loadGame() {
  const raw = localStorage.getItem('candyClicker');
  if (!raw) return;
  try {
    const d = JSON.parse(raw);
    candies         = d.candies        || 0;
    totalEarned     = d.totalEarned    || 0;
    totalClicks     = d.totalClicks    || 0;
    candiesPerClick = d.candiesPerClick|| 1;
    nextMilestone   = d.nextMilestone  || 0;
    (d.upgrades  || []).forEach((v, i) => { if (UPGRADES[i])  UPGRADES[i].bought = v; });
    (d.buildings || []).forEach((v, i) => { if (BUILDINGS[i]) BUILDINGS[i].count  = v; });
    recalcCPS();
  } catch(e) { console.warn('Save corrupt, starting fresh.'); }
}

function confirmReset() {
  if (!confirm('Reset ALL progress? This cannot be undone.')) return;
  localStorage.removeItem('candyClicker');
  location.reload();
}

// auto-save every 30 s
setInterval(saveGame, 30000);

// ── Boot ──────────────────────────────────────────────────────────────
loadGame();
updateUI();
renderShop();
</script>
</body>
</html>
